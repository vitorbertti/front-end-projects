<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

      <title>Agency landing page</title>
   </head>
   <body>
      <header class="header wrapper">
         <div class="header__content wrapper__content">
            <a href="/" class="header__logo">
               <img src="./images/logo.svg" alt="Sunnyside Logo" width="124" height="24" />
            </a>

            <nav>
               <span id="nav-label" class="visually-hidden">Navigation</span>
               <button id="btnOpen" class="header__open" aria-expanded="false" aria-labelledby="nav-label">
                  <img src="./images/icon-hamburger.svg" alt="Hamburger icon" width="24" height="18" />
               </button>
     
               <div class="header__menu" role="dialog" aria-labelledby="nav-label">
                  <button class="header__close" id="btnClose" aria-label="Close">
                     <img src="./images/icon-hamburger.svg" alt="Hamburger icon" width="24" height="18" />
                  </button>
                  <ul class="header__links">
                     <li><a href="" class="header__link">About</a></li>
                     <li><a href="" class="header__link">Services</a></li>
                     <li><a href="" class="header__link">Projects</a></li>
                     <li class="hide-on-mobile"><a href="" class="button white">Contact</a></li>
                     <li class="hide-on-desktop"><a href="" class="button yellow">Contact</a></li>
                  </ul>
               </div>
            </nav>
         </div>
      </header>

      <main>
         <section class="hero wrapper">
            <picture class="fullbleed hero__picture">
               <source media="(min-width: 64rem)" srcset="./images/desktop/image-header.jpg" width="2880" height="1600" />
               <img src="./images/mobile/image-header.jpg" class="hero__image" alt="orange slice on bright blue background" width="750" height="1076" />
            </picture>

            <div class="hero__content">
               <h1 class="hero__title">We are creatives</h1>
               <img class="hero__arrow" src="./images/icon-arrow-down.svg" alt="" width="30" height="107" />
            </div>
         </section>

         <section class="features">
            <div class="feature">
               <div class="feature__image">
                  <img src="./images/mobile/image-transform.jpg" alt="egg on yellow background" width="750" height="624" />
               </div>
               <div class="feature__text">
                  <h2>Transform your brand</h2>
                  <p>We are a full-service creative agency specializing in helping brands grow fast. Engage your clients through compelling visuals that do most of the marketing for you.</p>
                  <a href="" class="cta">Learn more</a>
               </div>
            </div>
            <div class="feature">
               <div class="feature__image">
                  <img src="./images/mobile/image-stand-out.jpg" alt="pink goblet on pink background" width="750" height="624" />
               </div>
            </div>
         </section>
      </main>
   </body>
</html>
